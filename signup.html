<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | Modern Web App</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="새로운 계정을 만들고 서비스를 시작하세요.">
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="form-header">
                <h2>계정 만들기</h2>
                <p>몇 가지 정보만 입력하면 준비가 완료됩니다!</p>
            </div>
            
            <form action="#" method="POST" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label for="fullname">이름</label>
                    <input type="text" id="fullname" name="fullname" placeholder="홍길동" required>
                </div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="8자 이상 입력하세요" minlength="8" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="비밀번호를 다시 입력하세요" minlength="8" required>
                </div>
                
                <button type="submit" class="btn-primary">가입하기</button>
            </form>
            
            <div class="form-footer">
                <p>이미 계정이 있으신가요? <a href="login.html">로그인하기</a></p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
