<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 | Modern Web App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="glass-panel" style="text-align: center;">
            <div class="form-header">
                <h2>메인 페이지</h2>
                <p>환영합니다! 원하시는 서비스로 이동해주세요.</p>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button onclick="goToLogin()" class="btn-primary" style="margin-top: 0;">로그인</button>
                <button onclick="goToSignup()" class="btn-primary"
                    style="margin-top: 0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: #fff;">회원가입</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
