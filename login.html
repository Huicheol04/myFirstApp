<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Modern Web App</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="로그인하여 서비스를 이용하세요.">
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="form-header">
                <h2>환영합니다</h2>
                <p>서비스를 이용하시려면 로그인해주세요</p>
            </div>
            
            <form action="#" method="POST" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <div class="options-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">로그인 유지</label>
                    </div>
                    <a href="#" class="forgot-link">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="btn-primary">로그인</button>
            </form>
            
            <div class="form-footer">
                <p>계정이 없으신가요? <a href="signup.html">회원가입하기</a></p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
